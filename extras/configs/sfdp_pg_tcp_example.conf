# SFDP Packet Generator TCP Example Configuration
# ================================================
# This configuration creates an SFDP tenant with a service chain,
# sets up a packet-generator interface, enables SFDP on the interface,
# and configures a TCP traffic stream.
#
# Usage:
#   vpp -c /path/to/sfdp_pg_tcp_example.conf
#
# Or load commands in VPP CLI:
#   vpp# exec /path/to/sfdp_pg_tcp_example.conf

# ==============================================================================
# Step 1: Create a packet-generator interface
# ==============================================================================
create packet-generator interface pg0

# Configure IP address on pg0 interface
set interface ip address pg0 192.168.1.1/24
set interface state pg0 up

# ==============================================================================
# Step 2: Create SFDP tenant
# ==============================================================================
# Create tenant with ID 1 and context 0
sfdp tenant add 1 context 0

# ==============================================================================
# Step 3: Configure SFDP service chains
# ==============================================================================
# Configure forward service chain for tenant 1
# Services:
#   - sfdp-l4-lifecycle: Session state tracking (TCP/UDP lifecycle)
#   - sfdp-session-stats: Export session statistics to ring buffer
#   - ip4-lookup: IPv4 routing lookup
set sfdp services tenant 1 sfdp-l4-lifecycle sfdp-session-stats ip4-lookup forward

# Configure reverse service chain for tenant 1
set sfdp services tenant 1 sfdp-l4-lifecycle sfdp-session-stats ip4-lookup reverse

# ==============================================================================
# Step 4: Enable SFDP on the packet-generator interface
# ==============================================================================
# Associate pg0 interface with tenant 1
set sfdp interface-input pg0 tenant 1

# ==============================================================================
# Step 5: Create TCP packet stream
# ==============================================================================
# Create a packet generator stream that sends TCP SYN packets
# - Source IP: 192.168.1.100
# - Destination IP: 192.168.1.200
# - Source Port: 12345
# - Destination Port: 80 (HTTP)
# - TCP Flags: SYN (0x02)

# packet-generator new { \
#   name tcp-syn-stream \
#   limit 100 \
#   size 64-64 \
#   interface pg0 \
#   node ethernet-input \
#   data { \
#     # Ethernet header
#     # Destination MAC: 00:00:00:00:00:02
#     # Source MAC: 00:00:00:00:00:01
#     # Ethertype: 0x0800 (IPv4)
#     hex 0x000000000002000000000001 0x0800 \
#     # IPv4 header
#     # Version/IHL: 0x45 (IPv4, 20 bytes header)
#     # TOS: 0x00
#     # Total Length: 40 bytes (will be calculated)
#     # ID: 0x0001
#     # Flags/Fragment: 0x4000 (Don't Fragment)
#     # TTL: 64
#     # Protocol: 6 (TCP)
#     # Header checksum: 0x0000 (to be calculated)
#     # Source IP: 192.168.1.100 (0xC0A80164)
#     # Dest IP: 192.168.1.200 (0xC0A801C8)
#     IP4: 192.168.1.100 -> 192.168.1.200 protocol tcp ttl 64 \
#     # TCP header
#     # Source Port: 12345 (0x3039)
#     # Dest Port: 80 (0x0050)
#     # Sequence: 0x00000001
#     # Ack: 0x00000000
#     # Data offset/Reserved: 0x50 (20 bytes header)
#     # Flags: 0x02 (SYN)
#     # Window: 65535 (0xFFFF)
#     # Checksum: 0x0000 (to be calculated)
#     # Urgent: 0x0000
#     TCP: 12345 -> 80 \
#     SYN \
#   } \
# }

# ==============================================================================
# Step 6: Create TCP response stream (for bidirectional testing)
# ==============================================================================
# packet-generator new { \
#   name tcp-synack \
#   limit 100 \
#   size 64-64 \
#   interface pg0 \
#   node ethernet-input \
#   data { \
#     hex 0x000000000001000000000002 0x0800 \
#     IP4: 192.168.1.200 -> 192.168.1.100 protocol tcp ttl 64 \
#     TCP: 80 -> 12345 syn ack \
#   } \
# }


# Forward direction: Client -> Server (TCP SYN)
packet-generator new {						\
  name tcp-forward						\
  limit 0							\
  rate 1e2							\
  node ip4-input						\
  size 100-100							\
  interface pg0							\
  data {							\
    TCP: 192.168.1.2 -> 192.168.1.1				\
    TCP: 32415 -> 80						\
    SYN								\
    incrementing 100						\
  }								\
}

# Reverse direction: Server -> Client (TCP SYN-ACK)
# This creates bidirectional traffic for the same session
packet-generator new {						\
  name tcp-reverse						\
  limit 0							\
  rate 1e2							\
  node ip4-input						\
  size 100-100							\
  interface pg0							\
  data {							\
    TCP: 192.168.1.1 -> 192.168.1.2				\
    TCP: 80 -> 32415						\
    SYN ACK							\
    incrementing 100						\
  }								\
}

# ==============================================================================
# Step 6: Enable session statistics ring buffer for monitoring
# ==============================================================================
# Enable session statistics ring buffer with periodic export
# This creates a ring buffer in the stats segment that can be consumed
# by external applications (e.g., vpp_session_stats_export for Prometheus)
sfdp session stats ring enable

# Configure periodic session statistics export (every 5 seconds)
# This will periodically export session statistics even for long-lived sessions
sfdp session stats periodic interval 5

# ==============================================================================
# To start the traffic, use these commands in VPP CLI:
# ==============================================================================
# Enable the TCP SYN stream:
#   packet-generator enable-stream tcp-syn-stream
#
# Enable the TCP SYN-ACK response stream:
#   packet-generator enable-stream tcp-synack-stream
#
# Show SFDP sessions:
#   show sfdp session-table tenant 1
#
# Show SFDP tenant configuration:
#   show sfdp tenant 1 detail
#
# Show SFDP services:
#   show sfdp services
#
# ==============================================================================

trace add pg-input 100

show memory main-heap
show memory stats-segment